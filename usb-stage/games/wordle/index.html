<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
<title>Wordle</title>
<style>
  :root{--bg:#121213;--fg:#fff;--tile:#3a3a3c;--empty:#121213;--brd:#3a3a3c;--g:#538d4e;--y:#b59f3b;--k:#3a3a3c;--key:#818384}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;font-family:ui-sans-serif,system-ui,Segoe UI,Roboto,sans-serif}
  body{margin:0;background:var(--bg);color:var(--fg);min-height:100vh;display:flex;flex-direction:column;align-items:center}
  header{width:100%;text-align:center;border-bottom:1px solid #2c2c2e;padding:8px 0}
  header h1{margin:0;font-size:28px;font-weight:800;letter-spacing:.18em}
  header button{position:absolute;right:10px;top:8px;background:#2c2c2e;color:#fff;border:0;border-radius:6px;padding:8px 12px;font:inherit;cursor:pointer}
  #msg{height:24px;margin:8px;font-weight:700;color:#fff}
  .board{display:grid;grid-template-rows:repeat(6,1fr);gap:5px;padding:10px}
  .row{display:grid;grid-template-columns:repeat(5,1fr);gap:5px}
  .tile{width:58px;height:58px;border:2px solid var(--brd);display:flex;align-items:center;justify-content:center;
        font-size:30px;font-weight:800;text-transform:uppercase}
  .tile.filled{border-color:#565758}
  .tile.g{background:var(--g);border-color:var(--g)}
  .tile.y{background:var(--y);border-color:var(--y)}
  .tile.k{background:var(--k);border-color:var(--k)}
  .kb{margin-top:auto;width:100%;max-width:500px;padding:8px}
  .krow{display:flex;justify-content:center;gap:6px;margin-bottom:6px}
  .key{background:var(--key);color:#fff;border:0;border-radius:5px;height:52px;flex:1;font-weight:700;font-size:14px;cursor:pointer;text-transform:uppercase}
  .key.wide{flex:1.5;font-size:12px}
  .key.g{background:var(--g)} .key.y{background:var(--y)} .key.k{background:var(--k)}
  @keyframes shake{10%,90%{transform:translateX(-2px)}30%,70%{transform:translateX(4px)}50%{transform:translateX(-6px)}}
  .shake{animation:shake .4s}
</style>
</head>
<body>
<header><h1>WORDLE</h1><button onclick="game.neww()">New</button></header>
<div id="msg"></div>
<div class="board" id="board"></div>
<div class="kb" id="kb"></div>

var ANS=[]; for(var i=0;i<ASTR.length;i+=5) ANS.push(ASTR.substr(i,5));
var VALID={}; for(var i=0;i<VSTR.length;i+=5) VALID[VSTR.substr(i,5)]=1;
var board=document.getElementById('board'), kb=document.getElementById('kb'), msg=document.getElementById('msg');
var answer, row, col, grid, over, keyState;
var ROWS=6, COLS=5;
function neww(){
  answer=ANS[Math.floor(Math.random()*ANS.length)];
  row=0; col=0; over=false; keyState={};
  grid=[]; for(var r=0;r<ROWS;r++){ grid.push(['','','','','']); }
  msg.textContent=''; render(); renderKb();
}
function say(t){ msg.textContent=t; }
function flash(t){ say(t); var rEl=board.children[row]; if(rEl){ rEl.classList.add('shake'); setTimeout(function(){rEl.classList.remove('shake');},400);} }
function key(ch){
  if(over) return;
  if(ch==='enter') return submit();
  if(ch==='del'){ if(col>0){ col--; grid[row][col]=''; render(); } return; }
  if(col<COLS && /^[a-z]$/.test(ch)){ grid[row][col]=ch; col++; render(); }
}
function submit(){
  if(col<COLS){ flash('not enough letters'); return; }
  var guess=grid[row].join('');
  if(!VALID[guess]){ flash('not in word list'); return; }
  // evaluate with duplicate handling
  var res=['k','k','k','k','k'], counts={};
  for(var i=0;i<5;i++){ var a=answer[i]; counts[a]=(counts[a]||0)+1; }
  for(var i=0;i<5;i++){ if(guess[i]===answer[i]){ res[i]='g'; counts[guess[i]]--; } }
  for(var i=0;i<5;i++){ if(res[i]!=='g'){ var c=guess[i]; if(counts[c]>0){ res[i]='y'; counts[c]--; } } }
  for(var i=0;i<5;i++){ paint(row,i,res[i]); setKey(guess[i],res[i]); }
  renderKb();
  if(guess===answer){ over=true; say(['Genius!','Magnificent!','Impressive!','Splendid!','Great!','Phew!'][row]); return; }
  row++; col=0;
  if(row>=ROWS){ over=true; say('Answer: '+answer.toUpperCase()); }
}
function rank(s){ return s==='g'?3:s==='y'?2:s==='k'?1:0; }
function setKey(ch,s){ if(rank(s)>rank(keyState[ch]||'')) keyState[ch]=s; }
function paint(r,i,s){ var t=board.children[r].children[i]; t.className='tile filled '+s; }
function render(){
  board.innerHTML='';
  for(var r=0;r<ROWS;r++){ var re=document.createElement('div'); re.className='row';
    for(var i=0;i<COLS;i++){ var t=document.createElement('div'); var ch=grid[r][i];
      t.className='tile'+(ch?' filled':''); t.textContent=ch; re.appendChild(t); }
    board.appendChild(re);
  }
}
var KROWS=['qwertyuiop','asdfghjkl','zxcvbnm'];
function renderKb(){
  kb.innerHTML='';
  KROWS.forEach(function(kr,ri){
    var re=document.createElement('div'); re.className='krow';
    if(ri===2){ re.appendChild(mkKey('enter','ENTER',true)); }
    kr.split('').forEach(function(ch){ re.appendChild(mkKey(ch,ch,false)); });
    if(ri===2){ re.appendChild(mkKey('del','DEL',true)); }
    kb.appendChild(re);
  });
}
function mkKey(code,label,wide){
  var b=document.createElement('button'); b.className='key'+(wide?' wide':'')+(keyState[code]?' '+keyState[code]:'');
  b.textContent=label; b.onclick=function(){ key(code); }; return b;
}
document.addEventListener('keydown',function(e){
  if(e.key==='Enter') key('enter');
  else if(e.key==='Backspace') key('del');
  else if(/^[a-zA-Z]$/.test(e.key)) key(e.key.toLowerCase());
});
window.game={neww:neww};
neww();
</script>
